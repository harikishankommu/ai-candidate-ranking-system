ai_usage_summary: |
  Used ChatGPT for architecture discussion, code review, debugging, and documentation.
  The ranking pipeline itself is deterministic, CPU-only, and makes no external API calls.

methodology_summary: |
  Evidence-based hybrid ranker that prioritizes career-history proof over self-declared
  skill keywords. The model scores production search, retrieval, recommendation,
  vector-infrastructure, ranking-evaluation, current-role, experience, product-company,
  stability, logistics, and Redrob engagement signals. It separately checks profile
  consistency using career dates, claimed experience, current-role matching, and
  implausible expert-skill durations, heavily penalizing suspected honeypots. Candidate
  explanations reference only profile facts and include availability concerns where
  relevant. The full 100K JSONL pool is streamed and ranked on CPU with no network or GPU.

declarations:
  read_submission_spec: true
  code_is_original_work: true
  no_collusion: true
  honeypot_check_done: true
  reproduction_tested: true
